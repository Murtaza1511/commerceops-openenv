name: apidebug-openenv
description: OpenEnv benchmark for HTTP/API debugging, structured repair, and deterministic grading

endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
  baseline: /baseline

actions:
  type: object
  properties:
    action_type:
      type: string
      enum: ["analyze", "ask", "propose_fix", "apply_fix", "confirm_done"]
    content:
      type: string
    predicted_diagnosis:
      type: string
      enum:
        [
          "missing_required_field",
          "wrong_request_line",
          "upstream_or_ambiguous",
        ]

observations:
  type: object
  properties:
    artifact:
      type: string
    latest_feedback:
      type: string
    conversation_history:
      type: array
      items:
        type: string
    steps_remaining:
      type: integer
    sentiment:
      type: number
    task_id:
      type: string
      nullable: true
    available_actions:
      type: array
      items:
        type: string
