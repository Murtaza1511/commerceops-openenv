name: customer-support-env
description: AI environment for commerce support operations, payment triage, and fraud escalation

endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
  baseline: /baseline

actions:
  type: object
  properties:
    action_type:
      type: string
      enum: ["classify", "ask", "respond", "resolve", "escalate"]
    content:
      type: string
    predicted_issue:
      type: string
      enum: ["payment_issue", "account_access", "fraud_risk", "product_bug"]

observations:
  type: object
  properties:
    latest_customer_message:
      type: string
    conversation_history:
      type: array
      items:
        type: string
    steps_remaining:
      type: integer
    sentiment:
      type: number
    task_id:
      type: string
      nullable: true
    available_actions:
      type: array
      items:
        type: string
